syntax = "proto3";
package liquent.permissions.v1beta1;

import "gogoproto/gogo.proto";
import "liquent/permissions/v1beta1/params.proto";
import "liquent/permissions/v1beta1/permissions.proto";

option go_package = "github.com/liquentlabs/liquent-core/liquent-chain/modules/permissions/types";

// GenesisState defines the permissions module's genesis state.
message GenesisState {
  // params defines the parameters of the module.
  Params params = 1 [ (gogoproto.nullable) = false ];
  repeated Namespace namespaces = 2 [ (gogoproto.nullable) = false ];
  repeated AddressVoucher vouchers = 3;
}