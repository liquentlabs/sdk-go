syntax = "proto3";
package liquent.permissions.v1beta1;

import "gogoproto/gogo.proto";
import "cosmos/base/v1beta1/coin.proto";
import "cosmos/bank/v1beta1/bank.proto";

option go_package = "github.com/liquentlabs/liquent-core/liquent-chain/modules/permissions/types";

message EventSetVoucher {
  string addr = 1;
  cosmos.base.v1beta1.Coin voucher = 2 [ (gogoproto.nullable) = false ];
}