syntax = "proto3";
package liquent.tokenfactory.v1beta1;

import "gogoproto/gogo.proto";
import "cosmos/base/v1beta1/coin.proto";

option go_package = "github.com/liquentlabs/liquent-core/liquent-chain/modules/tokenfactory/types";

// DenomAuthorityMetadata specifies metadata for addresses that have specific
// capabilities over a token factory denom. Right now there is only one Admin
// permission, but is planned to be extended to the future.
message DenomAuthorityMetadata {
  option (gogoproto.equal) = true;

  // Can be empty for no admin, or a valid liquent address
  string admin = 1 [ (gogoproto.moretags) = "yaml:\"admin\"" ];

  // true if the admin can burn tokens from other addresses
  bool admin_burn_allowed = 2
      [ (gogoproto.moretags) = "yaml:\"admin_burn_allowed\"" ];
}
