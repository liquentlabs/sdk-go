syntax = "proto3";
package liquent.erc20.v1beta1;

import "gogoproto/gogo.proto";
import "liquent/erc20/v1beta1/params.proto";
import "liquent/erc20/v1beta1/erc20.proto";

option go_package = "github.com/liquentlabs/liquent-core/liquent-chain/modules/erc20/types";

// GenesisState defines the erc20 module's genesis state.
message GenesisState {
  // params defines the parameters of the module.
  Params params = 1 [ (gogoproto.nullable) = false ];
  repeated TokenPair token_pairs = 2 [ (gogoproto.nullable) = false ];
}